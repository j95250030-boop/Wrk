name: main

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:

      # -------------------------------
      # 1. SYSTEM SETUP
      # -------------------------------
      - name: Setup Environment
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 python3-pip python3-venv git -qq
          echo "✅ Environment ready"

      # -------------------------------
      # 2. CHECKOUT BOT 1
      # -------------------------------
      - name: Checkout Bot1 (Bhh)
        uses: actions/checkout@v4
        with:
          repository: j95250030-boop/Bhh
          token: ${{ secrets.PAT_TOKEN }}
          path: bot1

      # -------------------------------
      # 3. CHECKOUT BOT 2
      # -------------------------------
      - name: Checkout Bot2 (Bqnwne)
        uses: actions/checkout@v4
        with:
          repository: j95250030-boop/Bqnwne
          token: ${{ secrets.PAT_TOKEN }}
          path: bot2

      # -------------------------------
      # 4. SETUP BOT 1
      # -------------------------------
      - name: Setup Bot1
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:   ${{ secrets.ADMIN_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: |
          python3 -m venv venv1
          ./venv1/bin/pip install --upgrade pip -q

          # Install dependencies (fix for requests error)
          if [ -f bot1/requirements.txt ]; then
            ./venv1/bin/pip install -r bot1/requirements.txt -q
          else
            ./venv1/bin/pip install python-telegram-bot requests -q
          fi

          echo '#!/bin/bash' > start1.sh
          echo 'cd bot1' >> start1.sh
          echo "export BOT_TOKEN=${BOT_TOKEN}" >> start1.sh
          echo "export ADMIN_ID=${ADMIN_ID}" >> start1.sh
          echo "export CHANNEL_ID=${CHANNEL_ID}" >> start1.sh
          echo 'echo "[BOT1] Starting..."' >> start1.sh
          echo '../venv1/bin/python -u main.py' >> start1.sh
          chmod +x start1.sh

      # -------------------------------
      # 5. SETUP BOT 2
      # -------------------------------
      - name: Setup Bot2
        env:
          BOT2_TOKEN:      ${{ secrets.BOT2_TOKEN }}
          BOT2_ADMIN_ID:   ${{ secrets.BOT2_ADMIN_ID }}
          BOT2_CHANNEL_ID: ${{ secrets.BOT2_CHANNEL_ID }}
        run: |
          python3 -m venv venv2
          ./venv2/bin/pip install --upgrade pip -q
          ./venv2/bin/pip install -r bot2/requirements.txt -q

          echo '#!/bin/bash' > start2.sh
          echo 'cd bot2' >> start2.sh
          echo "export BOT_TOKEN=${BOT2_TOKEN}" >> start2.sh
          echo "export ADMIN_ID=${BOT2_ADMIN_ID}" >> start2.sh
          echo "export CHANNEL_ID=${BOT2_CHANNEL_ID}" >> start2.sh
          echo 'echo "[BOT2] Starting..."' >> start2.sh
          echo '../venv2/bin/python -u main.py' >> start2.sh
          chmod +x start2.sh

      # -------------------------------
      # 6. RUN + MONITOR
      # -------------------------------
      - name: Run Bots
        run: |
          LOG1=bot1.log
          LOG2=bot2.log

          echo "🚀 Starting Bot1"
          bash start1.sh > $LOG1 2>&1 &
          PID1=$!

          echo "🚀 Starting Bot2"
          bash start2.sh > $LOG2 2>&1 &
          PID2=$!

          sleep 15
          END=$(( $(date +%s) + 325*60 ))

          while [ $(date +%s) -lt $END ]; do
            sleep 20
            TIME=$(date '+%H:%M:%S')

            echo "📊 [$TIME] Checking bots..."

            # Bot1
            if ! kill -0 $PID1 2>/dev/null; then
              echo "⚠️ Bot1 crashed → restarting"
              bash start1.sh >> $LOG1 2>&1 &
              PID1=$!
            else
              echo "✅ Bot1 running"
            fi

            # Bot2
            if ! kill -0 $PID2 2>/dev/null; then
              echo "⚠️ Bot2 crashed → restarting"
              bash start2.sh >> $LOG2 2>&1 &
              PID2=$!
            else
              echo "✅ Bot2 running"
            fi

            # Anti-freeze restart
            NOW=$(date +%s)
            if (( NOW % 7200 < 20 )); then
              echo "♻️ Anti-freeze restart"
              kill $PID1 2>/dev/null || true
              kill $PID2 2>/dev/null || true
            fi

            # Safe logs (masked)
            echo "--- BOT1 LOG ---"
            tail -5 $LOG1 | sed 's/[A-Za-z0-9:_-]\{20,\}/***HIDDEN***/g'

            echo "--- BOT2 LOG ---"
            tail -5 $LOG2 | sed 's/[A-Za-z0-9:_-]\{20,\}/***HIDDEN***/g'
          done

      # -------------------------------
      # 7. ERROR LOGS
      # -------------------------------
      - name: Show Logs on Failure
        if: failure()
        run: |
          echo "❌ Error detected"

          echo "--- BOT1 ---"
          tail -30 bot1.log | sed 's/[A-Za-z0-9:_-]\{20,\}/***HIDDEN***/g'

          echo "--- BOT2 ---"
          tail -30 bot2.log | sed 's/[A-Za-z0-9:_-]\{20,\}/***HIDDEN***/g'

      # -------------------------------
      # 8. AUTO RE-RUN
      # -------------------------------
      - name: Retrigger Workflow
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token ${PAT_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches \
            -d '{"ref":"main"}'

---

🔒 SECURITY DESIGN

- Secrets only used as ENV (never printed)
- Logs auto-masked via "sed"
- No accidental token exposure

---

🎯 FINAL RESULT

✔ Bots will run continuously (~6 hours)
✔ Auto restart if crash
✔ Freeze protection enabled
✔ Clean debugging logs

---

⚠️ IMPORTANT

If bot still crashes:

- check "requirements.txt"
- confirm "ADMIN_ID" is numeric
- confirm "main.py" exists in repo root

