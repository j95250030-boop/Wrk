name: main

on:
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    env:
      REPO_OWNER:    "j95250030-boop"
      BOT_REPO_NAME: "Bqnwne"

    steps:

      - name: Step 1 - Environment Setup
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3 python3-pip python3-venv git -qq
          echo "✅ Step 1 complete"

      - name: Step 2 - Checkout Signal Bot repo (Bhh)
        uses: actions/checkout@v4
        with:
          repository: j95250030-boop/Bhh
          token: ${{ secrets.PAT_TOKEN }}
          path: bot1_src

      - name: Step 3 - Restore Bot 1 DB cache
        uses: actions/cache@v4
        with:
          path: bot1_src/signal_bot.db
          key: signal-bot-db-${{ runner.os }}
          restore-keys: |
            signal-bot-db-

      - name: Step 4 - Setup Bot 1 (Signal Bot)
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          ADMIN_ID:   ${{ secrets.ADMIN_ID }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
          DB_PATH:    ${{ secrets.DB_PATH || 'signal_bot.db' }}
        run: |
          mkdir -p /home/runner/bots
          python3 -m venv /home/runner/bots/venv1
          /home/runner/bots/venv1/bin/pip install --upgrade pip -q
          /home/runner/bots/venv1/bin/pip install "python-telegram-bot[job-queue]>=21.0" -q

          [ -z "${BOT_TOKEN}" ]  && echo "ERROR: BOT_TOKEN not set"  && exit 1
          [ -z "${ADMIN_ID}" ]   && echo "ERROR: ADMIN_ID not set"   && exit 1
          [ -z "${CHANNEL_ID}" ] && echo "ERROR: CHANNEL_ID not set" && exit 1

          {
            echo '#!/bin/bash'
            echo "cd ${GITHUB_WORKSPACE}/bot1_src"
            echo "export BOT_TOKEN=\"${BOT_TOKEN}\""
            echo "export ADMIN_ID=\"${ADMIN_ID}\""
            echo "export CHANNEL_ID=\"${CHANNEL_ID}\""
            echo "export DB_PATH=\"${DB_PATH}\""
            echo 'echo "[BOT1] Starting main.py at $(date)"'
            echo '/home/runner/bots/venv1/bin/python -u main.py'
            echo 'EXIT_CODE=$?'
            echo 'echo "[BOT1] main.py exited with code $EXIT_CODE at $(date)"'
            echo 'exit $EXIT_CODE'
          } > /home/runner/bots/start1.sh
          chmod +x /home/runner/bots/start1.sh
          echo "✅ Step 4 complete — Bot 1 ready"

      - name: Step 5 - Setup Bot 2 (Bqnwne)
        env:
          PAT_TOKEN:       ${{ secrets.PAT_TOKEN }}
          BOT2_TOKEN:      ${{ secrets.BOT2_TOKEN }}
          BOT2_ADMIN_ID:   ${{ secrets.BOT2_ADMIN_ID }}
          BOT2_CHANNEL_ID: ${{ secrets.BOT2_CHANNEL_ID }}
          BOT2_DB_PATH:    ${{ secrets.BOT2_DB_PATH }}
        run: |
          git clone "https://${PAT_TOKEN}@github.com/${REPO_OWNER}/${BOT_REPO_NAME}.git" \
            /home/runner/bots/bot2 -q

          [ -z "${BOT2_TOKEN}" ] && echo "ERROR: BOT2_TOKEN not set" && exit 1

          {
            echo "BOT_TOKEN=${BOT2_TOKEN}"
            echo "ADMIN_ID=${BOT2_ADMIN_ID}"
            echo "CHANNEL_ID=${BOT2_CHANNEL_ID}"
            echo "DB_PATH=${BOT2_DB_PATH}"
          } > /home/runner/bots/bot2/.env

          python3 -m venv /home/runner/bots/venv2
          /home/runner/bots/venv2/bin/pip install --upgrade pip -q
          /home/runner/bots/venv2/bin/pip install -r /home/runner/bots/bot2/requirements.txt -q

          {
            echo '#!/bin/bash'
            echo 'cd /home/runner/bots/bot2'
            echo 'set -a'
            echo 'source .env'
            echo 'set +a'
            echo 'echo "[BOT2] Starting main.py at $(date)"'
            echo '/home/runner/bots/venv2/bin/python -u main.py'
            echo 'EXIT_CODE=$?'
            echo 'echo "[BOT2] main.py exited with code $EXIT_CODE at $(date)"'
            echo 'exit $EXIT_CODE'
          } > /home/runner/bots/start2.sh
          chmod +x /home/runner/bots/start2.sh
          echo "✅ Step 5 complete — Bot 2 ready"

      - name: Step 6 - Run Both Bots
        run: |
          LOG1=/home/runner/bots/bot1.log
          LOG2=/home/runner/bots/bot2.log

          nohup bash /home/runner/bots/start1.sh > "$LOG1" 2>&1 &
          BOT1_PID=$!
          sleep 5
          nohup bash /home/runner/bots/start2.sh > "$LOG2" 2>&1 &
          BOT2_PID=$!

          echo "✅ Both bots started"
          echo "   Bot1 PID: $BOT1_PID"
          echo "   Bot2 PID: $BOT2_PID"
          sleep 20

          RESTART1=0
          RESTART2=0
          END_TIME=$(( $(date +%s) + 325*60 ))

          while [ $(date +%s) -lt $END_TIME ]; do
            sleep 30
            TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S')

            if ! kill -0 $BOT1_PID 2>/dev/null; then
              RESTART1=$(( RESTART1 + 1 ))
              echo "⚠️  [$TIMESTAMP] Bot1 CRASHED — restarting (attempt $RESTART1)"
              nohup bash /home/runner/bots/start1.sh >> "$LOG1" 2>&1 &
              BOT1_PID=$!
              sleep 10
              echo "✅ [$TIMESTAMP] Bot1 restarted — PID: $BOT1_PID"
            fi

            if ! kill -0 $BOT2_PID 2>/dev/null; then
              RESTART2=$(( RESTART2 + 1 ))
              echo "⚠️  [$TIMESTAMP] Bot2 CRASHED — restarting (attempt $RESTART2)"
              nohup bash /home/runner/bots/start2.sh >> "$LOG2" 2>&1 &
              BOT2_PID=$!
              sleep 10
              echo "✅ [$TIMESTAMP] Bot2 restarted — PID: $BOT2_PID"
            fi

            echo "[MONITOR $TIMESTAMP] Bot1 ✅ (restarts:$RESTART1) | Bot2 ✅ (restarts:$RESTART2)"
          done

          echo "⏱️ Time limit reached — shutting down"

      - name: Step 7 - Show Crash Logs on Failure
        if: failure()
        run: |
          echo "❌ JOB FAILED"
          echo "---- BOT 1 LAST 30 LINES ----"
          tail -30 /home/runner/bots/bot1.log 2>/dev/null || echo "No log"
          echo "---- BOT 2 LAST 30 LINES ----"
          tail -30 /home/runner/bots/bot2.log 2>/dev/null || echo "No log"

      - name: Step 8 - Save Bot 1 DB cache
        if: always()
        uses: actions/cache@v4
        with:
          path: bot1_src/signal_bot.db
          key: signal-bot-db-${{ runner.os }}

      - name: Step 9 - Auto Retrigger
        if: always()
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Accept: application/vnd.github.v3+json" \
              -H "Authorization: token ${PAT_TOKEN}" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/main.yml/dispatches" \
              -d '{"ref":"main"}')
            echo "Trigger attempt $i: HTTP $STATUS"
            [ "$STATUS" = "204" ] && echo "✅ Next run triggered!" && break
            sleep 10
          done
